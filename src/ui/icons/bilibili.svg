<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#606266">
  <!-- Left antenna -->
  <path d="M8 2.5L10.5 5.5" stroke="#606266" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Right antenna -->
  <path d="M16 2.5L13.5 5.5" stroke="#606266" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- TV body (rounded rectangle, centered) -->
  <rect x="3" y="5.5" width="18" height="13" rx="3" ry="3" fill="none" stroke="#606266" stroke-width="1.6"/>
  <!-- Left eye (centered at x=8.75) -->
  <path d="M8 10L9.5 10L9 12.5L7.5 12.5Z" fill="#606266" transform="translate(0.25, 0)"/>
  <!-- Right eye (centered at x=15.25, mirrored) -->
  <path d="M14.5 10L16 10L15.5 12.5L14 12.5Z" fill="#606266" transform="translate(-0.25, 0)"/>
  <!-- Wavy mouth (centered at x=12) -->
  <path d="M9.5 14.5Q10.75 15.8 12 14.5Q13.25 13.2 14.5 14.5" stroke="#606266" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <!-- Left foot (symmetric to right) -->
  <path d="M8.5 18.5L8.5 20" stroke="#606266" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Right foot (symmetric to left) -->
  <path d="M15.5 18.5L15.5 20" stroke="#606266" stroke-width="1.5" stroke-linecap="round"/>
</svg>
